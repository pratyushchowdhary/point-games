<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#18221b">
  <title>Snake 97</title>
  <link rel="stylesheet" href="styles.css?v=modern-mode">
</head>
<body>
  <main class="phone" aria-label="Nokia-style Snake game">
    <div class="speaker" aria-hidden="true"></div>
    <p class="brand">NOKIA</p>

    <section class="screen-shell">
      <div class="screen">
        <header class="hud">
          <span>SCORE <strong id="score">000</strong></span>
          <span>SPD <strong id="speed">LV1</strong></span>
          <span>HI <strong id="high-score">000</strong></span>
        </header>
        <canvas id="game" width="84" height="48" aria-label="84 by 48 pixel Snake game board"></canvas>
        <div class="overlay" id="overlay">
          <h1 id="message">SNAKE 97</h1>
          <p id="submessage">PRESS START</p>
        </div>
      </div>
    </section>

    <section class="mode-picker" aria-label="Game mode">
      <button id="mode-original" type="button" aria-pressed="true">ORIGINAL</button>
      <button id="mode-modern" type="button" aria-pressed="false">MODERN</button>
    </section>

    <section class="screen-picker" aria-label="Playzone screen size">
      <button id="screen-minus" type="button" aria-label="Previous screen size">−</button>
      <div>
        <span>SCREEN SIZE</span>
        <strong id="screen-label">NOKIA ORIGINAL · 1.5″</strong>
      </div>
      <button id="screen-plus" type="button" aria-label="Next screen size">+</button>
    </section>

    <div class="action-row">
      <button class="soft-key" id="start" type="button">START</button>
      <button class="soft-key" id="pause" type="button">PAUSE</button>
    </div>

    <div class="dpad" aria-label="Direction controls">
      <button class="up" data-direction="up" aria-label="Move up">▲</button>
      <button class="left" data-direction="left" aria-label="Move left">◀</button>
      <div class="center" aria-hidden="true"></div>
      <button class="right" data-direction="right" aria-label="Move right">▶</button>
      <button class="down" data-direction="down" aria-label="Move down">▼</button>
    </div>

    <p class="help">ARROW KEYS / WASD · SWIPE · SPACE TO PAUSE</p>
  </main>
  <script src="game.js?v=modern-mode"></script>
</body>
</html>
