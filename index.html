<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111a15">
  <title>Point Games</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #dce8df;
      background: radial-gradient(circle at top, #34483d, #0b110d 65%);
      font-family: "Courier New", monospace;
    }
    main { width: min(680px, 100%); text-align: center; }
    h1 { margin: 0 0 8px; font-size: clamp(38px, 9vw, 72px); letter-spacing: 4px; }
    p { color: #aebbb1; }
    a {
      display: block;
      margin-top: 36px;
      padding: 28px;
      border: 3px solid #72816f;
      border-radius: 18px;
      color: #27351e;
      background: #a9b77a;
      box-shadow: 8px 8px 0 #000;
      text-decoration: none;
      transition: transform .15s;
    }
    a:hover, a:focus-visible { transform: translate(-3px, -3px); }
    strong { display: block; font-size: 28px; }
    span { display: block; margin-top: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <h1>POINT GAMES</h1>
    <p>Small games. Straight to the point.</p>
    <a href="nokia-snake-game/">
      <strong>NOKIA SNAKE</strong>
      <span>PLAY NOW →</span>
    </a>
  </main>
</body>
</html>
