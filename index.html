<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#18221b">
  <title>Snake 97</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone" aria-label="Nokia-style Snake game">
    <div class="speaker" aria-hidden="true"></div>
    <p class="brand">NOKIA</p>

    <section class="screen-shell">
      <div class="screen">
        <header class="hud">
          <span>SCORE <strong id="score">000</strong></span>
          <span>HI <strong id="high-score">000</strong></span>
        </header>
        <canvas id="game" width="320" height="320" aria-label="Snake game board"></canvas>
        <div class="overlay" id="overlay">
          <h1 id="message">SNAKE 97</h1>
          <p id="submessage">PRESS START</p>
        </div>
      </div>
    </section>

    <div class="action-row">
      <button class="soft-key" id="start" type="button">START</button>
      <button class="soft-key" id="pause" type="button">PAUSE</button>
    </div>

    <div class="dpad" aria-label="Direction controls">
      <button class="up" data-direction="up" aria-label="Move up">▲</button>
      <button class="left" data-direction="left" aria-label="Move left">◀</button>
      <div class="center" aria-hidden="true"></div>
      <button class="right" data-direction="right" aria-label="Move right">▶</button>
      <button class="down" data-direction="down" aria-label="Move down">▼</button>
    </div>

    <p class="help">ARROW KEYS / WASD · SPACE TO PAUSE</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
